<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Scene 1 - Reruntuhan Kuno</title>
  <!-- Library A-Frame LOKAL (harus ada di folder js/) -->
  <script src="js/aframe.min.js"></script>
  <script src="js/aframe-environment-component.min.js"></script>
  <script src="js/components.js"></script>
</head>
<body>
  <a-scene>

    <!-- ============================================================
         ENVIRONMENT - Preset: arches (Reruntuhan Kuno)
         ground: flat agar objek tidak tenggelam
         fog: 0.6 memberi efek kabut dramatis
    ============================================================ -->
    <a-entity environment="preset: arches; ground: flat; fog: 0.6"></a-entity>

    <!-- ============================================================
         KAMERA + CURSOR (untuk gaze/klik objek)
         fuse: true = gaze otomatis setelah 1.5 detik
    ============================================================ -->
    <a-entity camera look-controls wasd-controls position="0 1.6 4">
      <a-cursor
        fuse="true"
        fuse-timeout="1500"
        color="#DEB887"
        animation__click="property: scale; startEvents: click; from: 0.1 0.1 0.1; to: 1 1 1; dur: 150"
        raycaster="objects: .clickable">
      </a-cursor>
    </a-entity>

    <!-- ============================================================
         PENCAHAYAAN
    ============================================================ -->
    <a-light type="ambient" color="#C2A060" intensity="0.6"></a-light>
    <a-light type="directional" color="#FFE4B5" intensity="0.8"
             position="3 5 -2"></a-light>

    <!-- ============================================================
         OBJEK 1: BOX (Kotak) - Warna #A0522D (Sienna)
         Animasi: Rotasi lambat sumbu Y (7000ms loop)
         Posisi: kiri tengah
    ============================================================ -->
    <a-box
      id="box1"
      class="clickable"
      position="-2 0.75 -3"
      width="1.5" height="1.5" depth="1.5"
      color="#A0522D"
      shadow
      animation="property: rotation;
                 to: 0 360 0;
                 loop: true;
                 dur: 7000;
                 easing: linear">
    </a-box>

    <!-- ============================================================
         OBJEK 2: SPHERE (Bola) - Warna #DEB887 (Burlywood)
         Animasi: Naik-turun (melayang) easeInOutSine (2500ms loop)
         Posisi: tengah
    ============================================================ -->
    <a-sphere
      id="sphere1"
      class="clickable"
      position="0 1.2 -3"
      radius="0.8"
      color="#DEB887"
      shadow
      blink="interval: 1500"
      animation="property: position;
                 from: 0 1.5 -3;
                 to: 0 2.5 -3;
                 loop: true;
                 dir: alternate;
                 dur: 2500;
                 easing: easeInOutSine">
    </a-sphere>

    <!-- ============================================================
         OBJEK 3: CYLINDER (Silinder) - Warna #556B2F (Dark Olive Green)
         Animasi: Klik → putar 360° miring 45°
         Posisi: kanan tengah
    ============================================================ -->
    <a-cylinder
      id="cylinder1"
      class="clickable"
      position="2 0.9 -3"
      radius="0.6" height="1.8"
      color="#556B2F"
      shadow
      event-set__click="property: animation__spin.startEvents; value: click"
      animation__spin="property: rotation;
                       to: 0 360 45;
                       startEvents: click;
                       dur: 800;
                       easing: easeInOutQuad">
    </a-cylinder>

    <!-- ============================================================
         LATIHAN 1: CONE (Kerucut) - Warna sesuai tema (#8B4513)
         Posisi: sebelah KANAN silinder
         Animasi: Rotasi loop sumbu Y
         class="clickable" → klik ganti warna
    ============================================================ -->
    <a-cone
      id="cone1"
      class="clickable"
      position="4 0.9 -3"
      radius-bottom="0.6" height="1.8"
      color="#8B4513"
      shadow
      animation="property: rotation;
                 to: 0 360 0;
                 loop: true;
                 dur: 3000;
                 easing: linear">
    </a-cone>

    <!-- ============================================================
         TEKS JUDUL SCENE
    ============================================================ -->
    <a-text
      value="Reruntuhan Kuno"
      position="-1.5 3.5 -4"
      scale="2 2 2"
      color="#DEB887"
      font="assets/fonts/Roboto-msdf.json"
      negate="false">
    </a-text>

    <!-- ============================================================
         PORTAL KE SCENE 2 (Panorama)
         Letakkan di sebelah kiri, arahkan ke scene2.html
    ============================================================ -->
    <a-entity position="-4 0 -3">
      <!-- Frame portal -->
      <a-torus
        color="#A0522D"
        radius="1"
        radius-tubular="0.05"
        rotation="0 0 0">
      </a-torus>
      <!-- Isi portal (warna preview) -->
      <a-circle
        color="#556B2F"
        opacity="0.6"
        radius="0.95">
      </a-circle>
      <!-- Label portal -->
      <a-text
        value="⟶ Panorama 360°"
        position="-0.8 -1.3 0"
        scale="1.2 1.2 1.2"
        color="#FFE4B5">
      </a-text>
      <!-- Hitbox klik untuk pindah scene -->
      <a-circle
        class="clickable"
        opacity="0"
        radius="0.95"
        id="portal-scene2">
      </a-circle>
    </a-entity>

    <!-- ============================================================
         PORTAL KE SCENE 3 (Model 3D)
         Letakkan di sebelah kanan
    ============================================================ -->
    <a-entity position="4 0 -6">
      <a-torus
        color="#556B2F"
        radius="1"
        radius-tubular="0.05"
        rotation="0 -30 0">
      </a-torus>
      <a-circle
        color="#A0522D"
        opacity="0.6"
        radius="0.95"
        rotation="0 -30 0">
      </a-circle>
      <a-text
        value="⟶ Model 3D"
        position="-0.6 -1.3 0"
        scale="1.2 1.2 1.2"
        color="#FFE4B5">
      </a-text>
      <a-circle
        class="clickable"
        opacity="0"
        radius="0.95"
        rotation="0 -30 0"
        id="portal-scene3">
      </a-circle>
    </a-entity>

    <!-- ============================================================
         PORTAL KE SCENE 4 (Galeri 3D - Latihan 5 Bonus)
         Letakkan di depan, tengah
    ============================================================ -->
    <a-entity position="0 0 -8">
      <a-torus color="#FFD700" radius="1" radius-tubular="0.05"></a-torus>
      <a-circle color="#556B2F" opacity="0.6" radius="0.95"></a-circle>
      <a-text
        value="⟶ Galeri 3D"
        position="-0.6 -1.3 0"
        scale="1.2 1.2 1.2"
        color="#FFE4B5">
      </a-text>
      <a-circle
        class="clickable"
        opacity="0"
        radius="0.95"
        id="portal-scene4">
      </a-circle>
    </a-entity>

  </a-scene>

  <!-- ============================================================
       JAVASCRIPT: Interaksi klik objek + navigasi portal
  ============================================================ -->
  <script>
    // --- Klik SILINDER: putar + miring 45° ---
    document.querySelector('#cylinder1').addEventListener('click', function () {
      this.setAttribute('animation__spin', {
        property: 'rotation',
        to: '0 360 45',
        dur: 800,
        easing: 'easeInOutQuad'
      });
    });

    // --- Klik CONE (Latihan 1): ganti warna ---
    var coneColors = ['#8B4513', '#DEB887', '#556B2F', '#A0522D', '#FFD700'];
    var coneIndex = 0;
    document.querySelector('#cone1').addEventListener('click', function () {
      coneIndex = (coneIndex + 1) % coneColors.length;
      this.setAttribute('color', coneColors[coneIndex]);
    });

    // --- Portal ke Scene 2 ---
    document.querySelector('#portal-scene2').addEventListener('click', function () {
      window.location.href = 'scene2.html';
    });

    // --- Portal ke Scene 3 ---
    document.querySelector('#portal-scene3').addEventListener('click', function () {
      window.location.href = 'scene3-model.html';
    });

    // --- Portal ke Scene 4 (Galeri 3D) ---
    document.querySelector('#portal-scene4').addEventListener('click', function () {
      window.location.href = 'scene4-gallery.html';
    });
  </script>

</body>
</html>

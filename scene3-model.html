<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Scene 3 - Model 3D Reruntuhan Kuno</title>
  <script src="js/aframe.min.js"></script>
  <script src="js/components.js"></script>
</head>
<body>
  <a-scene>

    <!-- ============================================================
         LANGIT & TANAH - Sky Color Tema 8: #C2A060
    ============================================================ -->
    <a-sky color="#C2A060"></a-sky>
    <a-plane
      position="0 0 0"
      rotation="-90 0 0"
      width="50" height="50"
      color="#8B6914"
      shadow>
    </a-plane>

    <!-- ============================================================
         PENCAHAYAAN
    ============================================================ -->
    <a-light type="ambient" color="#FFE4B5" intensity="0.7"></a-light>
    <a-light type="directional" color="#FFF5E0" intensity="1.0"
             position="5 10 5" castShadow="true"></a-light>
    <a-light type="point" color="#FFD700" intensity="0.5"
             position="0 3 0"></a-light>

    <!-- ============================================================
         LATIHAN 4 (BONUS): MODEL 3D GLB dari Sketchfab
         Model: Arca Prajnaparamita (patung kuno, Free + Downloadable)
         File: assets/model2.glb
         ------------------------------------------------------------
         Penjelasan scale:
         Berdasarkan bounding box model asli, tinggi model pada
         sumbu Y sekitar 1.9 satuan unit glTF. Agar tinggi tampil
         berada pada rentang 1.5-2 meter sesuai ketentuan tugas,
         digunakan scale = 1 (tanpa pembesaran/pengecilan besar),
         karena 1 satuan unit model sudah setara kurang lebih 1 meter.
    ============================================================ -->
    <a-entity
      id="model3d"
      gltf-model="assets/model2.glb"
      position="0 1 -4"
      scale="1 1 1"
      shadow="receive: true"
      class="clickable"
      animation__idle="property: rotation;
                       from: 0 0 0;
                       to: 0 360 0;
                       loop: false;
                       dur: 1500;
                       startEvents: click">
    </a-entity>

    <!-- Label model -->
    <a-text
      value="Arca Prajnaparamita\nKlik untuk memutar"
      position="-1 2.5 -3"
      scale="1.2 1.2 1.2"
      color="#FFE4B5"
      align="center">
    </a-text>

    <!-- ============================================================
         PORTAL KE SCENE 4 (Galeri 3D - Latihan 5 Bonus)
    ============================================================ -->
    <a-entity position="0 0 -6">
      <a-torus color="#FFD700" radius="1" radius-tubular="0.05"></a-torus>
      <a-circle color="#A0522D" opacity="0.6" radius="0.95"></a-circle>
      <a-text
        value="Galeri 3D"
        position="-0.6 -1.3 0"
        scale="1 1 1"
        color="#FFE4B5">
      </a-text>
      <a-circle
        class="clickable"
        opacity="0"
        radius="0.95"
        id="portal-scene4">
      </a-circle>
    </a-entity>

    <!-- ============================================================
         KAMERA + CURSOR
    ============================================================ -->
    <a-entity camera look-controls wasd-controls position="0 1.6 3">
      <a-cursor
        fuse="true"
        fuse-timeout="1500"
        color="#DEB887"
        raycaster="objects: .clickable">
      </a-cursor>
    </a-entity>

    <!-- ============================================================
         DEKORASI TAMBAHAN - Objek reruntuhan di sekitar model
    ============================================================ -->
    <!-- Batu-batu dekorasi -->
    <a-box position="-2 0.2 -3" width="0.8" height="0.4" depth="0.6"
           color="#A0522D" rotation="0 30 0" shadow></a-box>
    <a-box position="2.5 0.15 -2.5" width="1" height="0.3" depth="0.5"
           color="#8B6914" rotation="0 -20 0" shadow></a-box>
    <a-box position="-1.5 0.1 -5" width="0.6" height="0.2" depth="0.4"
           color="#A0522D" rotation="0 45 0" shadow></a-box>

    <!-- Teks judul -->
    <a-text
      value="Model 3D - Reruntuhan Kuno"
      position="-2.5 3.5 -4"
      scale="1.5 1.5 1.5"
      color="#DEB887">
    </a-text>

    <!-- ============================================================
         PORTAL KEMBALI KE SCENE 1
    ============================================================ -->
    <a-entity position="-4 0 -3">
      <a-torus color="#A0522D" radius="1" radius-tubular="0.05"></a-torus>
      <a-circle color="#556B2F" opacity="0.6" radius="0.95"></a-circle>
      <a-text
        value="Kembali ke Scene 1"
        position="-1 -1.3 0"
        scale="1 1 1"
        color="#FFE4B5">
      </a-text>
      <a-circle
        class="clickable"
        opacity="0"
        radius="0.95"
        id="portal-back">
      </a-circle>
    </a-entity>

    <!-- ============================================================
         PORTAL KE SCENE 2
    ============================================================ -->
    <a-entity position="4 0 -3">
      <a-torus color="#556B2F" radius="1" radius-tubular="0.05"></a-torus>
      <a-circle color="#A0522D" opacity="0.6" radius="0.95"></a-circle>
      <a-text
        value="Panorama 360°"
        position="-0.8 -1.3 0"
        scale="1 1 1"
        color="#FFE4B5">
      </a-text>
      <a-circle
        class="clickable"
        opacity="0"
        radius="0.95"
        id="portal-scene2">
      </a-circle>
    </a-entity>

  </a-scene>

  <script>
    // Klik model → putar 360°
    var model = document.querySelector('#model3d');
    var isAnimating = false;

    model.addEventListener('click', function () {
      if (isAnimating) return;
      isAnimating = true;

      // Reset rotasi dulu
      model.setAttribute('rotation', '0 0 0');

      // Putar 360°
      model.setAttribute('animation__idle', {
        property: 'rotation',
        from: '0 0 0',
        to: '0 360 0',
        loop: false,
        dur: 1500,
        easing: 'easeInOutQuad'
      });

      // Setelah animasi selesai, reset flag
      setTimeout(function () {
        isAnimating = false;
        model.setAttribute('rotation', '0 0 0');
      }, 1600);
    });

    // Catatan: scale model sudah ditentukan secara manual (lihat komentar
    // pada elemen #model3d di atas) sesuai Latihan 4, sehingga tidak
    // dilakukan auto-adjust scale saat model-loaded.

    // Navigasi portal
    document.querySelector('#portal-back').addEventListener('click', function () {
      window.location.href = 'index.html';
    });
    document.querySelector('#portal-scene2').addEventListener('click', function () {
      window.location.href = 'scene2.html';
    });
    document.querySelector('#portal-scene4').addEventListener('click', function () {
      window.location.href = 'scene4-gallery.html';
    });
  </script>

</body>
</html>
